theme:
  name: material
  language: es
  logo: assets/logo.png
  favicon: assets/favicon.ico
  font:
    text: Roboto
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: white
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: black
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.tracking
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - content.tooltips
    - search.suggest
    - search.highlight
    - search.share
    - content.code.annotate
  icon:
    tag:
      etiqueta: octicons/tag-24
extra_css:
  - stylesheets/extra.css
markdown_extensions:
  - toc:
      permalink: true
